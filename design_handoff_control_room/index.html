<title>Suleiman Qureshi — Control Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; background: oklch(0.16 0.010 250); min-height: 100vh; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif; color: oklch(0.92 0.008 250); }
  .sans { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif; }
  .mono { font-family: "JetBrains Mono", ui-monospace, Menlo, monospace; }
  .stripes-dark { background-image: repeating-linear-gradient(135deg, rgba(255,255,255,0.05) 0 2px, transparent 2px 10px); }
  @keyframes blink { 0%, 50% { opacity:1 } 50.01%, 100% { opacity:0 } }
  .cursor-blink::after { content:"▌"; display:inline-block; margin-left:2px; animation: blink 1s steps(1) infinite; color: currentColor; }
  @keyframes pulse { 0%, 100% { opacity: 1 } 50% { opacity: .35 } }
  .pulse { animation: pulse 1.6s ease-in-out infinite; }
  #root { max-width: 1280px; margin: 0 auto; }
</style>
</head>

<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

</script>
